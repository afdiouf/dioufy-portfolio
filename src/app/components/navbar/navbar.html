<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="nav-inner">
    <a href="#hero" class="logo">AF<span>D</span></a>

    <ul class="nav-links" [class.open]="menuOpen()">
      @for (link of links; track link.href) {
        <li><a [href]="link.href" (click)="closeMenu()">{{ link.label }}</a></li>
      }
    </ul>

    <div class="nav-actions">
      <button class="theme-toggle" (click)="toggleTheme()" [title]="darkMode() ? 'Mode clair' : 'Mode sombre'">
        {{ darkMode() ? '☀️' : '🌙' }}
      </button>
      <button class="hamburger" (click)="toggleMenu()" [class.active]="menuOpen()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>
